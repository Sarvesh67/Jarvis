<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JARVIS · control center</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Jarvis" />
<meta name="theme-color" content="#080b10" />
<link rel="manifest" href="/static/manifest.json" />
<link rel="apple-touch-icon" href="/static/icon-192.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  :root{
    --bg:#080b10; --bg2:#0e131b; --panel:#11171f; --panel2:#151c26;
    --line:#1c2430; --line2:#283342; --fg:#e7eef6; --mut:#8a99ad; --faint:#5a6678;
    --cyan:#38bdf8; --cyandim:#1f6f99; --ok:#36d399; --warn:#fbbf24; --bad:#f87171;
    --glow:0 0 14px rgba(56,189,248,.45);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 var(--sans);
    background-image:radial-gradient(900px 500px at 78% -10%,rgba(56,189,248,.07),transparent 60%),
      linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:auto,46px 46px,46px 46px;background-position:0 0;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    background:linear-gradient(rgba(8,11,16,.0),rgba(8,11,16,.55));z-index:0}
  .app{position:relative;z-index:1;display:grid;grid-template-columns:236px 1fr;height:100vh;overflow:hidden}

  /* sidebar */
  .side{background:linear-gradient(180deg,rgba(17,23,31,.92),rgba(11,15,21,.92));
    border-right:1px solid var(--line);display:flex;flex-direction:column;backdrop-filter:blur(6px)}
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .logo{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;letter-spacing:.14em}
  .brand .logo i{color:var(--cyan);text-shadow:var(--glow)}
  .brand .tag{color:var(--faint);font-size:10px;letter-spacing:.34em;text-transform:uppercase;margin-top:3px;padding-left:1px}
  .navlbl{color:var(--faint);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:16px 18px 8px}
  .nav{padding:0 10px;display:flex;flex-direction:column;gap:3px}
  .nitem{position:relative;display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;
    color:var(--mut);cursor:pointer;border:1px solid transparent;transition:.16s}
  .nitem i{font-size:17px;width:18px;text-align:center}
  .nitem:hover{background:var(--panel);color:var(--fg)}
  .nitem.active{background:var(--panel2);color:var(--fg);border-color:var(--line2)}
  .nitem.active::before{content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:3px;border-radius:3px;
    background:var(--cyan);box-shadow:var(--glow)}
  .nitem .nm{flex:1;font-size:13.5px}
  .nitem .mini{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .side .foot{margin-top:auto;border-top:1px solid var(--line);padding:14px 16px;display:flex;flex-direction:column;gap:10px}
  .led{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--mut)}
  .led .d{width:8px;height:8px;border-radius:50%;background:var(--bad)}
  .led.up .d{background:var(--ok);box-shadow:0 0 10px rgba(54,211,153,.8);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .total{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .total b{color:var(--fg);font-weight:600}
  .xlinks{display:flex;gap:8px}
  .xlinks a{flex:1;text-align:center;font-size:11px;color:var(--mut);border:1px solid var(--line2);
    border-radius:8px;padding:6px 4px;text-decoration:none;transition:.16s}
  .xlinks a:hover{color:var(--cyan);border-color:var(--cyandim)}

  /* main */
  .main{display:flex;flex-direction:column;height:100vh;min-width:0}
  .topbar{display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line)}
  .topbar h1{margin:0;font-size:19px;font-weight:650}
  .topbar .sub{color:var(--mut);font-size:12px;margin-top:2px}
  .chip{font-family:var(--mono);font-size:11px;color:var(--mut);border:1px solid var(--line2);border-radius:20px;padding:3px 11px}
  .chip b{color:var(--cyan);font-weight:600}
  .spacer{flex:1}
  .tabs{display:flex;gap:4px;padding:0 22px;border-bottom:1px solid var(--line)}
  .tab{display:flex;align-items:center;gap:7px;padding:12px 14px;color:var(--mut);cursor:pointer;
    font-size:13.5px;border-bottom:2px solid transparent;transition:.16s}
  .tab i{font-size:16px}
  .tab:hover{color:var(--fg)}
  .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);text-shadow:0 0 12px rgba(56,189,248,.4)}
  .content{flex:1;min-height:0;position:relative}
  .scroll{height:100%;overflow:auto;padding:24px 26px}

  /* cards / metrics */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
  .metric .l{color:var(--faint);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase}
  .metric .v{font-family:var(--mono);font-size:25px;font-weight:600;margin-top:7px}
  .metric .v.glow{color:var(--cyan);text-shadow:var(--glow)}
  .metric .v.ok{color:var(--ok)} .metric .v.warn{color:var(--warn)} .metric .v.bad{color:var(--bad)}
  .metric .d{color:var(--faint);font-size:11px;margin-top:5px;font-family:var(--mono)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:18px 20px;margin-bottom:18px}
  .panel h3{margin:0 0 14px;font-size:12px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;
    display:flex;align-items:center;gap:8px}
  .panel h3 i{color:var(--cyan);font-size:15px}
  .bar{height:9px;background:#0a0f16;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin:10px 0}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyandim),var(--cyan));
    box-shadow:0 0 12px rgba(56,189,248,.5);transition:width .5s ease}
  .row{display:flex;justify-content:space-between;align-items:center;margin:7px 0;font-size:13px}
  .row .k{color:var(--mut)}
  .row .val{font-family:var(--mono)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{font-size:11px;background:#0c121a;color:var(--mut);border:1px solid var(--line2);border-radius:6px;padding:3px 9px;font-family:var(--mono)}
  .edit{display:flex;gap:9px;margin-top:8px;align-items:center}
  input,textarea,select{background:#0a0f16;border:1px solid var(--line2);color:var(--fg);border-radius:9px;
    padding:9px 11px;font:13px var(--sans);outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--cyandim);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
  input[type=number]{width:110px;font-family:var(--mono)}
  button{background:var(--cyan);color:#04121d;border:0;border-radius:9px;padding:9px 16px;font-weight:600;
    cursor:pointer;font-size:13px;transition:.16s}
  button:hover{box-shadow:var(--glow)}
  button.ghost{background:transparent;color:var(--cyan);border:1px solid var(--line2)}
  button.ghost:hover{border-color:var(--cyandim);box-shadow:none}
  button:disabled{opacity:.5;cursor:default;box-shadow:none}
  .note{font-size:12px;color:var(--mut);font-family:var(--mono)}
  .muted{color:var(--faint)}

  /* chat */
  .chat{display:flex;flex-direction:column;height:100%}
  .chathead{display:flex;align-items:center;gap:10px;padding:13px 26px;border-bottom:1px solid var(--line);color:var(--mut);font-size:12px;font-family:var(--mono)}
  .chathead .av{width:24px;height:24px;border-radius:7px;background:var(--panel2);border:1px solid var(--line2);
    display:flex;align-items:center;justify-content:center;color:var(--cyan)}
  .chathead .ghost{margin-left:auto;padding:5px 10px;font-size:11px}
  .msgs{flex:1;overflow:auto;padding:22px 26px;display:flex;flex-direction:column;gap:16px}
  .msg{display:flex;gap:11px;max-width:860px}
  .msg .ava{width:28px;height:28px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px}
  .msg.bot .ava{background:var(--panel2);border:1px solid var(--line2);color:var(--cyan)}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.user .ava{background:rgba(56,189,248,.12);border:1px solid var(--cyandim);color:var(--cyan)}
  .bubble{border-radius:12px;padding:11px 14px;font-size:14px;line-height:1.6}
  .msg.bot .bubble{background:var(--panel);border:1px solid var(--line)}
  .msg.user .bubble{background:rgba(56,189,248,.10);border:1px solid var(--cyandim)}
  .bubble pre{background:#06090d;border:1px solid var(--line2);border-radius:8px;padding:11px;overflow:auto;font:12px var(--mono);margin:8px 0}
  .bubble code{font-family:var(--mono);font-size:12.5px;background:#06090d;border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .bubble pre code{border:0;padding:0;background:none}
  .think{display:flex;gap:5px;align-items:center;color:var(--mut);font-size:13px}
  .think .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:blink 1.2s infinite}
  .think .dot:nth-child(2){animation-delay:.2s}.think .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .schip{font-size:12.5px;color:var(--mut);border:1px solid var(--line2);border-radius:20px;padding:6px 13px;cursor:pointer;transition:.16s}
  .schip:hover{color:var(--cyan);border-color:var(--cyandim)}
  .empty{margin:auto;text-align:center;color:var(--faint);max-width:460px}
  .empty .big{font-size:34px;color:var(--cyan);text-shadow:var(--glow);margin-bottom:10px}
  .composer{display:flex;gap:10px;padding:14px 26px;border-top:1px solid var(--line);align-items:flex-end}
  .composer textarea{flex:1;resize:none;max-height:160px;min-height:44px;line-height:1.5}

  /* ledger */
  .ledger{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
  .ledger th{text-align:left;color:var(--faint);font-weight:500;font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line2);position:sticky;top:0;background:var(--bg)}
  .ledger td{padding:9px 10px;border-bottom:1px solid var(--line)}
  .ledger tr:hover td{background:var(--panel)}
  .ledger .r{text-align:right}
  .gmodel{display:flex;align-items:center;gap:8px}
  .gbar{height:7px;border-radius:4px;background:linear-gradient(90deg,var(--cyandim),var(--cyan));box-shadow:0 0 8px rgba(56,189,248,.4)}
  #cy{height:100%;width:100%;background:
      radial-gradient(700px 360px at 70% 0,rgba(56,189,248,.05),transparent 60%),#080b10;
    border:1px solid var(--line);border-radius:13px}
  .kwrap{display:flex;flex-direction:column;height:100%;gap:14px}
  .kbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .loading{color:var(--mut);font-family:var(--mono);font-size:13px;padding:20px}

  /* live agent chat */
  .cfgbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 26px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .cfgbar .lbl{font-size:10.5px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
  .cfgbar select{padding:6px 9px;font-size:12.5px;font-family:var(--mono)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;color:var(--mut);border:0;border-radius:0;padding:6px 12px;font-size:12px;font-weight:500}
  .seg button.on{background:var(--cyan);color:#04121d}
  .seg button:hover{box-shadow:none;color:var(--fg)} .seg button.on:hover{color:#04121d}
  .cfgbtn{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--mut);border:1px solid var(--line2);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:500}
  .cfgbtn:hover{color:var(--cyan);border-color:var(--cyandim);box-shadow:none}
  .ctxmeter{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .ctxmeter .b{width:62px;height:6px;border:1px solid var(--line2);border-radius:4px;overflow:hidden}
  .ctxmeter .b>span{display:block;height:100%;background:var(--cyan)}
  .pop{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:12px;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .pop h4{margin:0 0 8px;font-size:10.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
  .pop label{display:flex;align-items:center;gap:9px;padding:5px 4px;font-size:13px;color:var(--fg);cursor:pointer}
  .pop label small{color:var(--faint);margin-left:auto;font-size:11px}
  .pop input[type=checkbox]{width:15px;height:15px;accent-color:var(--cyan)}
  .turn{display:flex;flex-direction:column;margin-bottom:18px}
  .turn.user{align-items:flex-end}
  .ubub{background:rgba(56,189,248,.10);border:1px solid var(--cyandim);border-radius:12px;padding:10px 14px;max-width:80%;font-size:14px;line-height:1.55}
  .ufiles{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .afile{font-family:var(--mono);font-size:11px;color:var(--mut);border:1px solid var(--line2);border-radius:6px;padding:2px 8px}
  .aturn{border-left:2px solid var(--cyandim);padding-left:15px;display:flex;flex-direction:column;gap:9px;max-width:900px}
  .aturn>*:empty{display:none}
  .thoughts{color:var(--faint);font-size:12.5px;font-style:italic;white-space:pre-wrap;line-height:1.5}
  .toolcard{border:1px solid var(--line);border-radius:10px;background:var(--panel);overflow:hidden}
  .toolcard .h{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer}
  .toolcard .h i.k{color:var(--cyan);font-size:16px}
  .toolcard .h .t{flex:1;font-family:var(--mono);font-size:12.5px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toolcard .st{font-size:11px;font-family:var(--mono);display:flex;align-items:center;gap:5px;flex:none}
  .toolcard .st.running{color:var(--cyan)} .toolcard .st.completed{color:var(--ok)} .toolcard .st.failed{color:var(--bad)}
  .spin{width:11px;height:11px;border:2px solid var(--line2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* MCP servers */
  button.ghost.danger{color:var(--bad);border-color:transparent}
  button.ghost.danger:hover{border-color:var(--bad)}
  .mcpitem{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-top:1px solid var(--line)}
  .mcpitem:first-child{border-top:0}
  .mcpname{font-weight:600;display:flex;align-items:center;gap:7px}
  .mcptag{font-size:10px;font-family:var(--mono);color:var(--mut);border:1px solid var(--line2);border-radius:6px;padding:1px 6px;text-transform:uppercase;letter-spacing:.06em}
  .mcpmeta{font-family:var(--mono);font-size:12px;color:var(--mut);margin-top:4px;word-break:break-all}
  .mcptest{font-family:var(--mono);font-size:11.5px;margin-top:6px;white-space:pre-wrap}
  .mcptest.good{color:var(--ok)} .mcptest.bad{color:var(--bad)}
  .toolcard .body{border-top:1px solid var(--line);padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--mut);white-space:pre-wrap;max-height:280px;overflow:auto}
  .toolcard.collapsed .body{display:none}
  .planbox{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:11px 14px}
  .planbox h5{margin:0 0 7px;font-size:10.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
  .planbox .pi{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0;color:var(--mut)}
  .planbox .pi i{font-size:15px;flex:none}
  .planbox .pi.completed{color:var(--ok)} .planbox .pi.in_progress{color:var(--cyan)}
  .atext{font-size:14px;line-height:1.65}
  .permcard{border:1px solid var(--warn);border-radius:10px;background:rgba(251,191,36,.08);padding:12px 14px}
  .permcard .q{font-size:13px;color:var(--fg);margin-bottom:10px}
  .permcard .q b{color:var(--warn);font-family:var(--mono)}
  .permcard .acts{display:flex;gap:8px;flex-wrap:wrap}
  .permcard button{padding:6px 14px;font-size:12.5px}
  .btn-deny{background:transparent;color:var(--bad);border:1px solid var(--bad)}
  .btn-deny:hover{box-shadow:none;background:rgba(248,113,113,.1)}
  .attachbar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 26px 0}
  .attachbar:empty{padding:0}
  .attachchip{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);border:1px solid var(--line2);border-radius:20px;padding:4px 11px;font-family:var(--mono)}
  .attachchip i{cursor:pointer;font-size:14px}
  .attachchip i:hover{color:var(--bad)}
  .iconbtn{background:transparent;border:1px solid var(--line2);color:var(--mut);border-radius:9px;padding:0 12px;font-size:17px;display:flex;align-items:center}
  .iconbtn:hover{color:var(--cyan);border-color:var(--cyandim);box-shadow:none}

  /* knowledge engine sub-tabs + ontology */
  .ksub{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)}
  .kst{display:flex;align-items:center;gap:7px;padding:10px 14px;color:var(--mut);cursor:pointer;font-size:13.5px;border-bottom:2px solid transparent}
  .kst i{font-size:16px}
  .kst:hover{color:var(--fg)}
  .kst.on{color:var(--cyan);border-bottom-color:var(--cyan);text-shadow:0 0 12px rgba(56,189,248,.4)}
  .relrow{display:flex;gap:8px;align-items:center;margin:6px 0;flex-wrap:wrap}
  .relrow select,.relrow input{font-size:12.5px}
  .chiprm{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;background:#0c121a;color:var(--fg);border:1px solid var(--line2);border-radius:7px;padding:5px 10px;margin:3px 5px 0 0}
  .chiprm small{color:var(--faint)}
  .chiprm i{cursor:pointer;color:var(--faint);font-size:14px} .chiprm i:hover{color:var(--bad)}
  .chiprm.sel{border-color:var(--cyandim);color:var(--cyan);cursor:pointer}
  .chiprm.sel i{display:none}
  .jobitem{border:1px solid var(--line);border-radius:9px;margin-bottom:8px;overflow:hidden}
  .jobitem .jh{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px}
  .jobitem .jlog{border-top:1px solid var(--line);padding:10px 12px;font-family:var(--mono);font-size:11.5px;color:var(--mut);white-space:pre-wrap;max-height:220px;overflow:auto}
  .jobitem.collapsed .jlog{display:none}
  .jbadge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:6px}
  .jbadge.running{color:var(--cyan);border:1px solid var(--cyandim)}
  .jbadge.done{color:var(--ok);border:1px solid var(--ok)}
  .jbadge.failed{color:var(--bad);border:1px solid var(--bad)}

  /* =========================== mobile / iPhone PWA =========================== */
  @media (max-width:640px){
    /* layout: sidebar becomes a fixed bottom bar of project switchers */
    .app{grid-template-columns:1fr;grid-template-rows:1fr auto;height:100vh;height:100dvh}
    .main{order:1;height:auto;min-height:0}
    .side{order:2;flex-direction:row;border-right:none;border-top:1px solid var(--line);
      padding:0;height:calc(58px + env(safe-area-inset-bottom));backdrop-filter:blur(6px);overflow-x:auto}
    .brand,.navlbl,.side .foot{display:none}
    .nav{flex-direction:row;padding:0;gap:0;flex:1}
    .nitem{flex-direction:column;gap:2px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      border-radius:0;border:none;font-size:10px;min-width:64px;align-items:center;justify-content:center}
    .nitem .nm{font-size:10px}
    .nitem .mini{display:none}
    .nitem.active{background:transparent}
    .nitem.active::before{left:0;right:0;bottom:0;top:auto;width:auto;height:2px;border-radius:2px 2px 0 0}

    /* iOS notch / dynamic island */
    .topbar{padding-top:calc(14px + env(safe-area-inset-top))}

    /* tighter horizontal padding everywhere */
    .topbar{padding-left:14px;padding-right:14px;gap:10px}
    .tabs{padding:0 6px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    .tab{padding:10px 8px;font-size:11.5px;gap:4px;flex:0 0 auto}
    .tab i{font-size:14px}
    .scroll{padding:12px 10px}
    .msgs{padding:12px 10px}
    .composer{padding:8px 10px}
    .chathead{padding:8px 12px}
    .cfgbar{padding:6px 10px;gap:6px}
    .panel{padding:12px 12px}

    .topbar h1{font-size:15px}
    .chip{padding:2px 7px;font-size:11px}

    /* metrics: 2-up */
    .metrics{grid-template-columns:1fr 1fr;gap:10px}

    /* touch targets */
    button{min-height:40px}
    button.ghost{min-height:36px}
    input,textarea,select{font-size:16px}  /* >=16px stops iOS auto-zoom on focus */

    /* chat: use full width */
    .msg{max-width:100%}
    .aturn{max-width:100%}
    .ubub{max-width:94%}
    .cfgbar .lbl{display:none}

    /* ledger: drop low-value columns (Type, In, Out, Latency) to fit */
    .ledger th:nth-child(3),.ledger td:nth-child(3),
    .ledger th:nth-child(4),.ledger td:nth-child(4),
    .ledger th:nth-child(5),.ledger td:nth-child(5),
    .ledger th:nth-child(8),.ledger td:nth-child(8){display:none}
    .ledger{font-size:11.5px}
    .ledger th,.ledger td{padding:6px 5px}

    /* knowledge graph canvas */
    #cy{height:280px !important}

    /* form inputs that hardcode wide min-widths */
    #mcpfields input,#mcpfields select,
    .relrow select,.relrow input{width:100% !important;min-width:unset !important}
    .relrow{flex-wrap:wrap}

    /* signals sub-tabs + dispatch rows wrap cleanly */
    .ksub{flex-wrap:wrap;gap:4px}
    .edit{flex-wrap:wrap}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo"><i class="ti ti-diamond"></i>JARVIS</div>
      <div class="tag">control center</div>
    </div>
    <div class="navlbl">Projects</div>
    <div class="nav" id="nav"></div>
    <div class="foot">
      <span class="led" id="led"><span class="d"></span>gateway …</span>
      <span class="total" id="total"></span>
      <div class="xlinks">
        <a href="http://127.0.0.1:4000/ui" target="_blank">LiteLLM ↗</a>
        <a href="http://127.0.0.1:3000" target="_blank">FalkorDB ↗</a>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar" id="topbar"></header>
    <nav class="tabs" id="tabs"></nav>
    <section class="content" id="content"></section>
  </main>
</div>

<script>
const $ = (s,r=document)=>r.querySelector(s);

// --- auth: token is injected into the shell by GET / (window.__JARVIS_TOKEN) ---
const tok = () => window.__JARVIS_TOKEN || "";
// Drop-in fetch replacement that attaches the bearer token to every /api call.
const apiFetch = (url, opts={}) => {
  opts.headers = {"Authorization": "Bearer " + tok(), ...(opts.headers||{})};
  return window.fetch(url, opts);
};

const TABS = [
  {id:"overview", lbl:"Overview", icon:"ti-layout-dashboard"},
  {id:"chat", lbl:"Chat", icon:"ti-message-2"},
  {id:"transactions", lbl:"Transactions", icon:"ti-receipt"},
  {id:"knowledge", lbl:"Knowledge engine", icon:"ti-affiliate"},
  {id:"signals", lbl:"Signals", icon:"ti-bolt"},
  {id:"dispatch", lbl:"Dispatch", icon:"ti-calendar-bolt"},
  {id:"mcp", lbl:"MCP servers", icon:"ti-plug-connected"},
];
const ICON = {hedgefund:"ti-chart-candle", msme:"ti-building-store", jarvis:"ti-robot"};
const SUGGEST = {
  hedgefund:["What's stored in my knowledge graph?","Summarize recent market notes","What positions are we tracking?"],
  msme:["What's in the MSME knowledge base?","Draft a follow-up for a client","Summarize this week's tasks"],
  jarvis:["What can you help me with?","Search my knowledge graph","Give me a status of the platform"],
};
const state = {alias:null, tab:"overview", overview:null, cy:null};
const CHATS = JSON.parse(localStorage.getItem("jarvis_chat_v2")||"{}");
const saveChats = ()=>localStorage.setItem("jarvis_chat_v2", JSON.stringify(CHATS));

function money(v){
  if(v==null) return "—";
  v=Number(v);
  if(v===0) return "$0";
  if(v<0.01) return "$"+v.toFixed(5);
  if(v<1) return "$"+v.toFixed(4);
  return "$"+v.toFixed(2);
}
function ktok(n){ n=Number(n||0); return n>=1000 ? (n/1000).toFixed(n>=100000?0:1)+"k" : String(n); }
function curProj(){ return (state.overview?.projects||[]).find(p=>p.alias===state.alias) || null; }
function hasGraph(p){ return !!(p && p.graph && p.graph.exists); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function md(s){
  return (s||"").split(/```/).map((seg,i)=>{
    if(i%2===1){
      const nl=seg.indexOf("\n"); const body=nl>=0?seg.slice(nl+1):seg;
      return "<pre><code>"+esc(body)+"</code></pre>";
    }
    return esc(seg).replace(/`([^`]+)`/g,"<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");
  }).join("");
}
function tfmt(iso){
  if(!iso) return "—";
  const d=new Date(iso); if(isNaN(d)) return "—";
  return d.toLocaleString(undefined,{month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

/* ---------- sidebar / topbar / tabs ---------- */
function renderSidebar(){
  const d=state.overview; if(!d) return;
  $("#nav").innerHTML = d.projects.map(p=>{
    const rem = p.remaining;
    return `<div class="nitem ${p.alias===state.alias?"active":""}" onclick="selectProject('${p.alias}')">
      <i class="ti ${ICON[p.alias]||"ti-folder"}"></i>
      <span class="nm">${esc(p.label)}</span>
      <span class="mini">${rem==null?"":money(rem)}</span>
    </div>`;
  }).join("");
  $("#led").className = "led "+(d.gateway_up?"up":"");
  $("#led").innerHTML = `<span class="d"></span>gateway ${d.gateway_up?"online":"offline"}`;
  $("#total").innerHTML = `total <b>${money(d.total_spend)}</b> / ${money(d.total_budget)} · mo`;
}
function renderTopbar(){
  const p=curProj(); if(!p) return;
  $("#topbar").innerHTML = `
    <div>
      <h1>${esc(p.label)}</h1>
      <div class="sub">${p.alias} · agent <b style="color:var(--cyan)">${esc(p.agent?.model||"—")}</b></div>
    </div>
    <span class="spacer"></span>
    <span class="chip">budget <b>${money(p.spend)}</b> / ${money(p.budget)}</span>
    <span class="chip">remaining <b>${money(p.remaining)}</b></span>`;
}
function renderTabs(){
  const p=curProj();
  const tabs = TABS.filter(t=>(t.id!=="knowledge"&&t.id!=="signals") || hasGraph(p));
  if(!tabs.find(t=>t.id===state.tab)) state.tab="overview";
  $("#tabs").innerHTML = tabs.map(t=>`<div class="tab ${t.id===state.tab?"active":""}" onclick="selectTab('${t.id}')">
    <i class="ti ${t.icon}"></i>${t.lbl}</div>`).join("");
}
function selectProject(a){ state.alias=a; state.tab="overview"; renderAll(); }
function selectTab(t){ state.tab=t; renderTabs(); renderContent(); }
function renderAll(){ renderSidebar(); renderTopbar(); renderTabs(); renderContent(); }

/* ---------- content router ---------- */
function renderContent(){
  const c=$("#content");
  state.cy=null;
  if(state.tab==="overview"){ c.innerHTML=`<div class="scroll">${viewOverview()}</div>`; }
  else if(state.tab==="chat"){ c.innerHTML=viewChat(); afterChat(); }
  else if(state.tab==="transactions"){ c.innerHTML=`<div class="scroll"><div class="loading">loading ledger…</div></div>`; loadTxns(); }
  else if(state.tab==="knowledge"){ c.innerHTML=viewKnowledge(); afterKnowledge(); }
  else if(state.tab==="signals"){ c.innerHTML=viewSignals(); afterSignals(); }
  else if(state.tab==="dispatch"){ c.innerHTML=`<div class="scroll" id="dwrap"><div class="loading">loading tasks…</div></div>`; afterDispatch(); }
  else if(state.tab==="mcp"){ c.innerHTML=`<div class="scroll" id="mcpwrap"><div class="loading">loading MCP servers…</div></div>`; afterMcp(); }
}

/* ---------- overview ---------- */
function viewOverview(){
  const p=curProj(); if(!p) return "";
  const pct = p.budget ? Math.min(100,100*p.spend/p.budget) : 0;
  const cls = pct>90?"bad":pct>70?"warn":"ok";
  const g=p.graph||{};
  return `
  <div class="metrics">
    <div class="metric"><div class="l">Budget / mo</div><div class="v">${money(p.budget)}</div><div class="d">${p.budget_duration||"30d"} window</div></div>
    <div class="metric"><div class="l">Spent</div><div class="v ${cls}">${money(p.spend)}</div><div class="d">${pct.toFixed(1)}% used</div></div>
    <div class="metric"><div class="l">Remaining</div><div class="v glow">${money(p.remaining)}</div><div class="d">until reset</div></div>
    <div class="metric"><div class="l">Graph nodes</div><div class="v">${g.nodes??0}</div><div class="d">${g.edges??0} edges</div></div>
  </div>
  <div class="panel">
    <h3><i class="ti ti-gauge"></i>Budget</h3>
    <div class="row"><span class="k">${money(p.spend)} of ${money(p.budget)}</span><span class="val ${cls==="ok"?"":cls}" style="color:var(--${cls})">${pct.toFixed(1)}%</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <div class="edit">
      <input id="bud" type="number" step="1" value="${p.budget??""}" placeholder="budget $"/>
      <button onclick="setBudget()">Set budget</button>
      <span class="note" id="budnote"></span>
    </div>
  </div>
  <div class="panel">
    <h3><i class="ti ti-cpu"></i>Agent</h3>
    <div class="row"><span class="k">Profile</span><span class="val">${esc(p.alias)}</span></div>
    <div class="row"><span class="k">Model</span><span class="val" style="color:var(--cyan)">${esc(p.agent?.model||"—")}</span></div>
    <div class="row"><span class="k">Wrapper</span><span class="val">${esc(p.agent?.wrapper||"—")}</span></div>
    <div class="row"><span class="k">Chat session</span><span class="val">ui-${esc(p.alias)}</span></div>
  </div>
  <div class="panel">
    <h3><i class="ti ti-affiliate"></i>Knowledge snapshot</h3>
    ${hasGraph(p)?`
      <div class="row"><span class="k">Nodes · edges · types</span><span class="val">${g.nodes} · ${g.edges} · ${(g.labels||[]).length}</span></div>
      <div class="tags">${(g.labels||[]).map(l=>`<span class="tag">${esc(l)}</span>`).join("")||'<span class="muted">no labels yet</span>'}</div>
      <div style="margin-top:12px"><button class="ghost" onclick="selectTab('knowledge')">Open knowledge engine →</button></div>
    `:`<span class="muted">No knowledge graph for the general agent.</span>`}
  </div>`;
}
async function setBudget(){
  const v=parseFloat($("#bud").value); const note=$("#budnote");
  if(isNaN(v)){ note.textContent="enter a number"; return; }
  note.textContent="saving…";
  const r=await apiFetch(`/api/project/${state.alias}/budget`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({max_budget:v})});
  note.textContent=r.ok?"✓ saved":"✗ failed";
  if(r.ok) setTimeout(refreshOverview,500);
}

/* ---------- live agent chat (ACP over WebSocket) ---------- */
let MODELS=[]; const TOOLSETS={};
let WS=null, WSAlias=null, RUNNING=false, LIVE=null, PENDING_FILES=[];

async function loadModels(){ if(!MODELS.length){ try{ MODELS=(await (await apiFetch('/api/models')).json()).models||[]; }catch(e){} } return MODELS; }
async function loadToolsets(a){ if(!TOOLSETS[a]){ try{ TOOLSETS[a]=(await (await apiFetch('/api/toolsets/'+a)).json()).toolsets||[]; }catch(e){ TOOLSETS[a]=[]; } } return TOOLSETS[a]; }
function cstate(a){ let s=CHATS[a]; if(!s||Array.isArray(s)) s=CHATS[a]={turns:[],cfg:{model:null,tools:null,yolo:false},usage:null}; s.turns=s.turns||[]; s.cfg=s.cfg||{model:null,tools:null,yolo:false}; return s; }

function viewChat(){
  const p=curProj();
  return `<div class="chat">
    <div class="cfgbar">
      <span class="lbl">model</span>
      <select id="msel" onchange="onModel(this.value)" title="Model is fixed before the turn; changing it switches the agent's brain"></select>
      <span class="lbl">mode</span>
      <span class="seg" id="modeseg">
        <button data-m="ask" onclick="onMode(false)" title="Dangerous actions ask for approval">Ask</button>
        <button data-m="auto" onclick="onMode(true)" title="Auto-approve everything (yolo)">Auto</button></span>
      <button class="cfgbtn" id="tbtn" onclick="toggleTools()"><i class="ti ti-adjustments-horizontal"></i> Tools</button>
      <span class="spacer"></span>
      <span class="ctxmeter" id="ctx"></span>
      <button class="cfgbtn" onclick="clearChat()" title="Clear this view"><i class="ti ti-trash"></i></button>
    </div>
    <div class="pop" id="tpan" hidden style="margin:10px 26px 0;max-height:250px"></div>
    <div class="msgs" id="msgs"></div>
    <div class="attachbar" id="abar"></div>
    <div class="composer">
      <button class="iconbtn" onclick="pickFiles()" title="Attach files / images"><i class="ti ti-paperclip"></i></button>
      <input type="file" id="fin" multiple hidden onchange="onFiles(this)">
      <textarea id="ci" placeholder="Message the ${esc(p.label)} agent…   (Enter to send · Shift+Enter for newline)"></textarea>
      <button id="cb" onclick="sendChat()">Send</button>
      <button id="cancelb" class="btn-deny" hidden onclick="cancelRun()"><i class="ti ti-player-stop"></i> Stop</button>
    </div>
  </div>`;
}
function emptyChat(){
  const p=curProj();
  return `<div class="empty"><div class="big"><i class="ti ti-diamond"></i></div>
    <div>Chat with the <b style="color:var(--fg)">${esc(p.label)}</b> agent — live.<br>You'll see its tool calls, plan and thoughts as it works. It has this project's skills, knowledge graph and budget.</div>
    <div class="chips">${(SUGGEST[state.alias]||[]).map(s=>`<span class="schip" onclick="quick(this)">${esc(s)}</span>`).join("")}</div></div>`;
}
async function afterChat(){
  const a=state.alias, st=cstate(a), p=curProj();
  await loadModels(); await loadToolsets(a);
  const sel=$('#msel');
  if(sel){ sel.innerHTML=MODELS.map(m=>`<option value="${m.id}">${esc(m.label)}</option>`).join('');
    sel.value = st.cfg.model || p.agent?.model || (MODELS[0]&&MODELS[0].id) || ''; st.cfg.model=sel.value; }
  updateModeSeg(); updateToolsBtn(); renderCtx(st.usage);
  const list=$('#msgs'); list.innerHTML='';
  if(!st.turns.length){ list.innerHTML=emptyChat(); }
  else st.turns.forEach(t=>{ if(t.role==='user') appendUserTurn(t); else { const el=makeAssistantEl(); list.appendChild(el); t.done=true; paintAssistant(refsOf(el),t); } });
  const ta=$('#ci'); ta.focus();
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(170,ta.scrollHeight)+'px';});
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} });
  renderAttachBar(); scrollMsgs();
}
function scrollMsgs(){ const m=$('#msgs'); if(m) m.scrollTop=m.scrollHeight; }
function quick(el){ $('#ci').value=el.textContent; sendChat(); }
function clearChat(){ if(confirm('Clear this conversation view? (the agent keeps its own session memory)')){ const st=cstate(state.alias); st.turns=[]; st.usage=null; saveChats(); renderContent(); } }

/* config controls */
function onModel(v){ cstate(state.alias).cfg.model=v; saveChats(); }
function onMode(yolo){ cstate(state.alias).cfg.yolo=yolo; saveChats(); updateModeSeg(); }
function updateModeSeg(){ const st=cstate(state.alias); document.querySelectorAll('#modeseg button').forEach(b=>b.classList.toggle('on', (b.dataset.m==='auto')===!!st.cfg.yolo)); }
function effTools(a){ const ts=TOOLSETS[a]||[], custom=cstate(a).cfg.tools; return ts.filter(t=>custom?custom.includes(t.name):t.enabled).map(t=>t.name); }
function updateToolsBtn(){ const b=$('#tbtn'); if(b) b.innerHTML=`<i class="ti ti-adjustments-horizontal"></i> Tools (${effTools(state.alias).length})`; }
function toggleTools(){ const p=$('#tpan'); if(!p) return; p.hidden=!p.hidden; if(!p.hidden) renderToolsPanel(); }
function renderToolsPanel(){
  const a=state.alias, st=cstate(a), ts=TOOLSETS[a]||[], custom=st.cfg.tools;
  const on=n=>custom?custom.includes(n):(ts.find(x=>x.name===n)?.enabled);
  $('#tpan').innerHTML = `<h4>Toolsets the agent may use in this chat</h4>`+
    ts.map(t=>`<label><input type="checkbox" ${on(t.name)?'checked':''} onchange="toggleTool('${t.name}',this.checked)"> ${esc(t.name)} <small>${esc(t.desc)}</small></label>`).join('')+
    `<div style="margin-top:9px"><a href="#" onclick="resetTools(event)">reset to profile defaults</a></div>`;
}
function toggleTool(name,checked){ const a=state.alias, st=cstate(a), ts=TOOLSETS[a]||[]; let cur=new Set(st.cfg.tools|| ts.filter(x=>x.enabled).map(x=>x.name)); checked?cur.add(name):cur.delete(name); st.cfg.tools=[...cur]; saveChats(); updateToolsBtn(); }
function resetTools(e){ e.preventDefault(); cstate(state.alias).cfg.tools=null; saveChats(); renderToolsPanel(); updateToolsBtn(); }
function renderCtx(u){ const el=$('#ctx'); if(!el) return; if(!u||!u.size){ el.innerHTML=''; return; } const pct=Math.min(100,100*u.used/u.size); el.innerHTML=`ctx <span class="b"><span style="width:${pct}%"></span></span> ${Math.round(u.used/1000)}k/${Math.round(u.size/1000)}k`; }

/* attachments */
function pickFiles(){ $('#fin').click(); }
function onFiles(input){ for(const f of input.files) PENDING_FILES.push(f); input.value=''; renderAttachBar(); }
function rmFile(i){ PENDING_FILES.splice(i,1); renderAttachBar(); }
function renderAttachBar(){ const b=$('#abar'); if(b) b.innerHTML=PENDING_FILES.map((f,i)=>`<span class="attachchip"><i class="ti ti-file"></i> ${esc(f.name)} <i class="ti ti-x" onclick="rmFile(${i})"></i></span>`).join(''); }
function readFileB64(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res({name:file.name,mime:file.type||'application/octet-stream',data:r.result}); r.onerror=()=>res(null); r.readAsDataURL(file); }); }

/* turn rendering */
function appendUserTurn(t){
  const f=(t.files||[]).map(n=>`<span class="afile"><i class="ti ti-paperclip"></i> ${esc(n)}</span>`).join('');
  $('#msgs').insertAdjacentHTML('beforeend', `<div class="turn user"><div class="ubub">${(esc(t.text||'').replace(/\n/g,'<br>'))||'<span class="muted">(attachment only)</span>'}${f?`<div class="ufiles">${f}</div>`:''}</div></div>`);
}
function makeAssistantEl(){ const d=document.createElement('div'); d.className='turn assistant';
  d.innerHTML='<div class="aturn"><div class="thoughts" data-th></div><div class="tools" data-tools></div><div class="planwrap" data-plan></div><div class="atext" data-text></div><div class="perms" data-perms></div></div>'; return d; }
function refsOf(el){ return {el, th:el.querySelector('[data-th]'), tools:el.querySelector('[data-tools]'), plan:el.querySelector('[data-plan]'), text:el.querySelector('[data-text]'), perms:el.querySelector('[data-perms]')}; }
function kindIcon(k){ k=(k||'').toLowerCase(); if(k.includes('exec')||k.includes('term'))return'ti-terminal-2'; if(k.includes('read')||k.includes('file'))return'ti-file-text'; if(k.includes('edit')||k.includes('write'))return'ti-edit'; if(k.includes('search'))return'ti-search'; if(k.includes('fetch')||k.includes('web'))return'ti-world'; if(k.includes('think'))return'ti-bulb'; if(k.includes('delete'))return'ti-trash'; return'ti-tool'; }
function stClass(s){ s=(s||'').toLowerCase(); if(s==='completed')return'completed'; if(s==='failed'||s==='error')return'failed'; if(s==='running'||s==='in_progress'||s==='pending'||!s)return'running'; return''; }
function stInner(s){ const c=stClass(s); if(c==='completed')return'<i class="ti ti-check"></i>done'; if(c==='failed')return'<i class="ti ti-x"></i>failed'; return'<span class="spin"></span>'+(s||'running'); }
function ctext(content){ if(!content)return''; if(!Array.isArray(content))content=[content]; return content.map(c=>{ const cc=(c&&c.content)?c.content:c; return (cc&&cc.text)||(cc&&cc.content&&cc.content.text)||''; }).filter(Boolean).join('\n'); }
function toolCardHTML(t){ const body=esc(t.content||''); return `<div class="toolcard ${t.status==='failed'?'':'collapsed'}" data-tc="${esc(t.id)}">
  <div class="h" onclick="this.parentNode.classList.toggle('collapsed')"><i class="ti ${kindIcon(t.kind)} k"></i><span class="t">${esc(t.title||t.kind||'tool')}</span><span class="st ${stClass(t.status)}" data-st>${stInner(t.status)}</span></div>
  <div class="body" data-body>${body}</div></div>`; }
function planHTML(entries){ if(!entries||!entries.length)return''; return `<div class="planbox"><h5>Plan</h5>${entries.map(e=>{ const s=(e.status||'').toLowerCase(); const ic=s==='completed'?'ti-circle-check':s==='in_progress'?'ti-loader-2':'ti-circle'; return `<div class="pi ${s}"><i class="ti ${ic}"></i>${esc(e.content||'')}</div>`; }).join('')}</div>`; }
function paintAssistant(r,t){ if(t.thoughts){ r.th.textContent=t.thoughts; } r.tools.innerHTML=(t.tools||[]).map(toolCardHTML).join(''); r.plan.innerHTML=t.plan?planHTML(t.plan):''; r.text.innerHTML=md(t.text||''); }

/* websocket */
function wsConnect(alias){
  if(WS && WSAlias===alias && WS.readyState<=1) return WS;
  if(WS){ try{WS.close()}catch(e){} }
  const proto=location.protocol==='https:'?'wss':'ws';
  const _t=tok();  // browsers can't set headers on WS connect -> pass token as query param
  WS=new WebSocket(`${proto}://${location.host}/ws/chat/${alias}${_t?'?token='+encodeURIComponent(_t):''}`); WSAlias=alias;
  WS.onmessage=ev=>onWsMsg(alias, JSON.parse(ev.data));
  WS.onclose=()=>{ if(RUNNING){ setRunning(false); } };
  return WS;
}
function wsSend(o){ const s=()=>WS.send(JSON.stringify(o)); if(WS.readyState===1) s(); else WS.addEventListener('open', s, {once:true}); }
function setRunning(b){ RUNNING=b; const cb=$('#cb'), x=$('#cancelb'); if(cb){cb.disabled=b; cb.hidden=b;} if(x) x.hidden=!b; }

async function sendChat(){
  const ta=$('#ci'); if(!ta||RUNNING) return;
  const text=ta.value.trim(); const files=PENDING_FILES.slice();
  if(!text && !files.length) return;
  const a=state.alias, st=cstate(a);
  const list=$('#msgs'); if(list.querySelector('.empty')) list.innerHTML='';
  const uturn={role:'user',text,files:files.map(f=>f.name)};
  st.turns.push(uturn); appendUserTurn(uturn);
  const aturn={role:'assistant',thoughts:'',tools:[],plan:null,text:'',done:false};
  st.turns.push(aturn);
  const el=makeAssistantEl(); list.appendChild(el); LIVE={...refsOf(el), turn:aturn};
  saveChats(); ta.value=''; ta.style.height='auto'; setRunning(true); scrollMsgs();
  wsConnect(a);
  const attachments=(await Promise.all(files.map(readFileB64))).filter(Boolean);
  PENDING_FILES=[]; renderAttachBar();
  wsSend({t:'prompt', text, model:st.cfg.model||undefined, toolsets:(st.cfg.tools&&st.cfg.tools.length?st.cfg.tools:undefined), yolo:!!st.cfg.yolo, attachments});
}
function onWsMsg(alias, m){
  if(alias!==state.alias) return;
  if(m.t==='update') handleUpdate(m.u);
  else if(m.t==='permission') handlePermission(m);
  else if(m.t==='done') finishTurn(m.res);
  else if(m.t==='error') liveError(m.error);
}
function handleUpdate(u){
  const su=u.sessionUpdate;
  if(su==='usage_update'){ const st=cstate(state.alias); st.usage={used:u.used,size:u.size}; renderCtx(st.usage); return; }
  if(!LIVE) return; const t=LIVE.turn;
  if(su==='agent_message_chunk'){ t.text+=(u.content&&u.content.text)||''; LIVE.text.innerHTML=md(t.text); scrollMsgs(); }
  else if(su==='agent_thought_chunk'){ t.thoughts+=(u.content&&u.content.text)||''; LIVE.th.textContent=t.thoughts; scrollMsgs(); }
  else if(su==='tool_call'){ const tc={id:u.toolCallId,title:u.title,kind:u.kind,status:u.status||'running',content:ctext(u.content)}; t.tools.push(tc); LIVE.tools.insertAdjacentHTML('beforeend', toolCardHTML(tc)); scrollMsgs(); }
  else if(su==='tool_call_update'){ const tc=t.tools.find(x=>x.id===u.toolCallId); const c=ctext(u.content); if(tc){ if(u.status)tc.status=u.status; if(c)tc.content=c; } const card=LIVE.tools.querySelector(`[data-tc="${u.toolCallId}"]`); if(card){ const st=card.querySelector('[data-st]'); st.className='st '+stClass(u.status||(tc&&tc.status)); st.innerHTML=stInner(u.status||(tc&&tc.status)); if(c){ card.querySelector('[data-body]').textContent=c; } if((u.status||'').toLowerCase()==='failed') card.classList.remove('collapsed'); } else if(tc){ LIVE.tools.insertAdjacentHTML('beforeend', toolCardHTML(tc)); } scrollMsgs(); }
  else if(su==='plan'){ t.plan=u.entries||[]; LIVE.plan.innerHTML=planHTML(t.plan); scrollMsgs(); }
  saveChats();
}
function handlePermission(m){
  if(!LIVE) return;
  const p=m.params||{}, tc=p.toolCall||{}, opts=p.options||[];
  const title=tc.title||(tc.rawInput&&tc.rawInput.command)||'run a tool';
  const cid='perm'+Math.random().toString(36).slice(2);
  const btns = opts.length ? opts.map(o=>{ const deny=/reject|deny|no/i.test((o.kind||'')+(o.name||'')); return `<button class="${deny?'btn-deny':''}" onclick="answerPerm('${m.reqId}','${esc(o.optionId)}',${!deny},'${cid}')">${esc(o.name||o.optionId)}</button>`; }).join('')
    : `<button onclick="answerPerm('${m.reqId}','allow',true,'${cid}')">Allow</button><button class="btn-deny" onclick="answerPerm('${m.reqId}','',false,'${cid}')">Deny</button>`;
  LIVE.perms.insertAdjacentHTML('beforeend', `<div class="permcard" id="${cid}"><div class="q">Agent requests permission to <b>${esc(title)}</b></div><div class="acts">${btns}</div></div>`);
  scrollMsgs();
}
function answerPerm(reqId, optionId, allow, cid){ wsSend({t:'permission', reqId, optionId, allow}); const c=document.getElementById(cid); if(c) c.outerHTML=`<div class="note" style="color:${allow?'var(--ok)':'var(--bad)'}">${allow?'✓ allowed':'✗ denied'}</div>`; }
function finishTurn(res){ if(LIVE){ LIVE.turn.done=true; if(res&&res.stopReason&&res.stopReason!=='end_turn'&&!LIVE.turn.text){ LIVE.text.innerHTML=`<span class="muted">(stopped: ${esc(res.stopReason)})</span>`; } } LIVE=null; setRunning(false); saveChats(); scrollMsgs(); }
function liveError(err){ if(LIVE){ LIVE.text.innerHTML=md((LIVE.turn.text?LIVE.turn.text+'\n\n':'')+'⚠ '+err); LIVE.turn.text+='\n\n⚠ '+err; LIVE.turn.done=true; } LIVE=null; setRunning(false); saveChats(); }

let MCP_KV=[];  // staging rows for headers/env on the add form
async function afterMcp(){
  const a=state.alias; let servers=[];
  try{ servers=(await (await apiFetch('/api/mcp/'+a)).json()).servers||[]; }catch(e){}
  if(state.tab!=='mcp'||state.alias!==a) return;
  const w=$('#mcpwrap'); if(!w) return;
  w.innerHTML = `
    <div class="panel">
      <h3><i class="ti ti-plug-connected"></i> Connected MCP servers — ${esc(curProj().label)}</h3>
      <div class="note" style="margin-bottom:12px">Servers added here are written into this project's Hermes profile, so its agent (chat, ACP and CLI) gets their tools. New tools then show up under <b>Tools</b> in Chat. Secrets are stored in the profile config (chmod 600) and never shown back here.</div>

function mcpRow(s){
  const meta = s.transport==='url'
    ? esc(s.url||'')
    : esc(((s.command||'')+' '+(s.args||[]).join(' ')).trim());
  const auth = [
    s.header_keys.length?`headers: ${s.header_keys.map(esc).join(', ')}`:'',
    s.env_keys.length?`env: ${s.env_keys.map(esc).join(', ')}`:'',
  ].filter(Boolean).join(' · ');
  return `<div class="mcpitem">
    <div style="flex:1;min-width:0">
      <div class="mcpname"><i class="ti ti-${s.transport==='url'?'world':'terminal-2'}"></i> ${esc(s.name)}
        <span class="mcptag">${s.transport}</span></div>
      <div class="mcpmeta">${meta||'—'}${auth?`<span class="muted"> · ${auth}</span>`:''}</div>
      <div class="mcptest muted" id="mt-${esc(s.name)}"></div>
    </div>
    <div class="edit" style="gap:8px">
      <button class="ghost" onclick="mcpTest('${esc(s.name)}')"><i class="ti ti-plug"></i> Test</button>
      <button class="ghost danger" onclick="mcpRemove('${esc(s.name)}')"><i class="ti ti-trash"></i></button>
    </div>

}
function mcpAddForm(){
  return `<div class="panel">
    <h3><i class="ti ti-plus"></i> Add a server</h3>
    <div class="edit" style="flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px">
      <input id="mcpname" placeholder="name (e.g. notion)" style="width:180px">
      <div class="seg" id="mcpseg">
        <button class="on" data-t="url" onclick="mcpType('url')">HTTP / URL</button>
        <button data-t="stdio" onclick="mcpType('stdio')">Stdio (command)</button>
      </div>
    </div>
    <div id="mcpfields"></div>
    <div class="edit" style="margin-top:14px;align-items:center;gap:12px">
      <button onclick="mcpAdd()"><i class="ti ti-plug-connected"></i> Connect server</button>
      <span class="note" id="mcpnote"></span>
    </div>
  </div>`;
}
let MCP_TYPE='url';
function mcpType(t){ MCP_TYPE=t; MCP_KV=[]; $('#mcpseg').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.t===t)); renderMcpFields(); }
function afterMcpForm(){ MCP_TYPE='url'; MCP_KV=[]; renderMcpFields(); }
function renderMcpFields(){
  const f=$('#mcpfields'); if(!f) return;
  const kvLabel = MCP_TYPE==='url'?'Headers (auth)':'Environment variables';
  const kvHint  = MCP_TYPE==='url'?'e.g. Authorization = Bearer sk-… — sent with every request':'e.g. API_KEY = … — passed to the subprocess';
  let main;
  if(MCP_TYPE==='url'){
    main=`<input id="mcpurl" placeholder="https://mcp.example.com/mcp" style="width:100%">`;
  } else {
    main=`<div class="edit" style="gap:10px">
      <input id="mcpcmd" placeholder="command (e.g. npx, uvx)" style="width:200px">
      <input id="mcpargs" placeholder="args, space-separated (e.g. -y @scope/server)" style="flex:1;min-width:220px">
    </div>`;
  }
  f.innerHTML = `${main}
    <div style="margin-top:14px">
      <div class="note" style="margin-bottom:8px">${kvLabel} <span class="muted">— ${kvHint}</span></div>
      <div id="mcpkv">${MCP_KV.map(mcpKvRow).join('')}</div>
      <div class="edit" style="margin-top:8px"><button class="ghost" onclick="mcpAddKv()"><i class="ti ti-plus"></i> Add ${MCP_TYPE==='url'?'header':'variable'}</button></div>
    </div>`;
}
function mcpKvRow(kv,i){
  return `<div class="edit mcpkvrow" style="margin-bottom:6px;gap:8px">
    <input value="${esc(kv.k)}" placeholder="key" style="width:200px" oninput="MCP_KV[${i}].k=this.value">
    <input value="${esc(kv.v)}" placeholder="value" style="flex:1;min-width:180px" oninput="MCP_KV[${i}].v=this.value">
    <button class="ghost danger" onclick="mcpRmKv(${i})"><i class="ti ti-x"></i></button>
  </div>`;
}
function mcpAddKv(){ MCP_KV.push({k:'',v:''}); renderMcpFields(); }
function mcpRmKv(i){ MCP_KV.splice(i,1); renderMcpFields(); }
function mcpKvMap(){ const o={}; for(const {k,v} of MCP_KV){ if(k.trim()) o[k.trim()]=v; } return o; }
async function mcpAdd(){
  const note=$('#mcpnote'), name=($('#mcpname')?.value||'').trim();
  if(!name){ note.textContent='give the server a name'; return; }
  const body={name, transport:MCP_TYPE};
  if(MCP_TYPE==='url'){
    body.url=($('#mcpurl')?.value||'').trim();
    if(!body.url){ note.textContent='enter the server URL'; return; }
    body.headers=mcpKvMap();
  } else {
    body.command=($('#mcpcmd')?.value||'').trim();
    if(!body.command){ note.textContent='enter a command'; return; }
    body.args=($('#mcpargs')?.value||'').trim().split(/\s+/).filter(Boolean);
    body.env=mcpKvMap();
  }
  note.textContent='connecting…';
  let r; try{ r=await (await apiFetch('/api/mcp/'+state.alias,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json(); }
  catch(e){ note.textContent='failed: '+e.message; return; }
  if(r.ok){ note.textContent='✓ connected — testing…'; await afterMcp(); mcpTest(name); }
  else note.textContent='✗ '+(r.detail||'failed');
}
async function mcpRemove(name){
  if(!confirm(`Remove MCP server "${name}" from ${curProj().label}?`)) return;
  try{ await apiFetch(`/api/mcp/${state.alias}/${encodeURIComponent(name)}`,{method:'DELETE'}); }catch(e){}
  afterMcp();
}
async function mcpTest(name){
  const el=$('#mt-'+name); if(el){ el.className='mcptest muted'; el.innerHTML='<span class="spin"></span> testing connection…'; }
  let r; try{ r=await (await apiFetch(`/api/mcp/${state.alias}/${encodeURIComponent(name)}/test`,{method:'POST'})).json(); }
  catch(e){ if(el){el.className='mcptest bad';el.textContent='test failed: '+e.message;} return; }
  const tgt=$('#mt-'+name); if(!tgt) return;
  tgt.className='mcptest '+(r.ok?'good':'bad');
  const first=(r.output||'').split('\n').filter(l=>l.trim()).slice(0,6).join('\n');
  tgt.textContent=(r.ok?'✓ ':'✗ ')+first;
}

async function afterSignals(){

function pct(v){ return v==null?'—':(v*100).toFixed(2)+'%'; }
function sparkline(eq){
  if(!eq||eq.length<2) return '';
  const w=120,h=28,mn=Math.min(...eq),mx=Math.max(...eq),rng=(mx-mn)||1;
  const pts=eq.map((v,i)=>`${(i/(eq.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(' ');
  const up=eq[eq.length-1]>=eq[0];
  return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${up?'#34d399':'#f87171'}" stroke-width="1.4"/></svg>`;
}
function renderSPropose(){
  $('#sbody').innerHTML=`

    </div>`;
  }
  $('#obody').innerHTML=h;
}
function oRm(key,i){ KONTO[key].splice(i,1); renderOBody(); }
function oAddTag(){ const i=$('#oin'),v=i.value.trim(); if(v&&!KONTO.tags.includes(v))KONTO.tags.push(v); i.value=''; renderOBody(); }
function oAddEnt(){ const i=$('#oent'),v=i.value.trim(); if(v&&!KONTO.entityTypes.includes(v))KONTO.entityTypes.push(v); i.value=''; renderOBody(); }
function oAddRel(){ const n=$('#orelname').value.trim(); if(!n)return; KONTO.relationTypes.push({name:n,source:$('#orelsrc').value,target:$('#oreltgt').value}); renderOBody(); }
async function oSave(){ const note=$('#onote'); if(note)note.textContent='saving…';
  try{ await apiFetch(`/api/knowledge/${state.alias}/ontology`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entityTypes:KONTO.entityTypes,relationTypes:KONTO.relationTypes,tags:KONTO.tags})}); KONTO_ALIAS=null; await loadSchema(state.alias,true); if(note)note.textContent='✓ saved — applies on next ingest'; }catch(e){ if(note)note.textContent='✗ '+e.message; } }
async function oUploadOwl(input){ const f=input.files[0]; if(!f)return; const note=$('#owlnote'); note.textContent='uploading…'; const b=await readFileB64(f);
  try{ const r=await (await apiFetch(`/api/knowledge/${state.alias}/owl`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name,data:b.data})})).json(); if(r.ok){ KONTO_ALIAS=null; await loadSchema(state.alias,true); renderKOnto(); } else note.textContent='✗ failed'; }catch(e){ note.textContent='✗ '+e.message; } }
async function oRmOwl(){ try{ await apiFetch(`/api/knowledge/${state.alias}/owl`,{method:'DELETE'}); KONTO_ALIAS=null; await loadSchema(state.alias,true); renderKOnto(); }catch(e){} }

/* --- pipeline: pre-processing steps + cognify routing strategy --- */
function ensureKpipe(){ const a=state.alias, sc=KSCHEMA[a]||{}; if(KPIPE_ALIAS!==a||!KPIPE){ KPIPE=JSON.parse(JSON.stringify(sc.pipeline||DEFAULT_PIPE())); if(!KPIPE.preprocessing)KPIPE.preprocessing={enabled:false,steps:[]}; if(!KPIPE.cognify)KPIPE.cognify={defaultModel:'extractor',routing:{enabled:false,rules:[]}};
  (KPIPE.preprocessing.steps||[]).forEach(s=>{ if(!s.output){ s.output=(s.kind==='classify')?'signal':'rewrite'; } delete s.kind; });  // migrate legacy kind -> output
  KPIPE_ALIAS=a; } }
function kPipe(m){ state.kptab=m; renderKPipeline(); }
function csv(s){ return (s||'').split(',').map(x=>x.trim()).filter(Boolean); }
function pSaveBar(){ return `<div style="display:flex;gap:10px;align-items:center"><button onclick="pSave()"><i class="ti ti-device-floppy"></i> Save pipeline</button><span class="note" id="pnote"></span></div>`; }
function renderKPipeline(){
  ensureKpipe(); const mode=state.kptab||(state.kptab='pre');
  const M=[['pre','Pre-processing'],['cog','Cognify strategy']];
  $('#kbody').innerHTML=`
    <div class="panel" style="margin-bottom:14px">
      <div class="note" style="margin-bottom:10px">Pre-processing cleans / filters / annotates each document; the cognify strategy routes it to an extractor model. Both apply on the next ingest.</div>
      <div class="seg" id="pseg">${M.map(([m,l])=>`<button class="${mode===m?'on':''}" onclick="kPipe('${m}')">${l}</button>`).join('')}</div>
    </div>
    <div id="pbody"></div>`;
  if(mode==='pre') renderPPre(); else renderPCog();
}

/* pre-processing segment */
function ppStep(i){ return KPIPE.preprocessing.steps[i]; }
function ppSet(i,k,v){ ppStep(i)[k]=v; }
function ppScope(i,v){ const dt=csv(v); ppStep(i).appliesTo={docTypes:dt.length?dt:['*']}; }
function ppLabels(i,v){ ppStep(i).labels=csv(v); }
function ppMove(i,d){ const a=KPIPE.preprocessing.steps,j=i+d; if(j<0||j>=a.length)return; [a[i],a[j]]=[a[j],a[i]]; renderPPre(); }
function ppDel(i){ KPIPE.preprocessing.steps.splice(i,1); renderPPre(); }
function ppAdd(){ KPIPE.preprocessing.steps.push({id:'step'+Date.now(),name:'New step',output:'rewrite',enabled:true,model:'preprocess',appliesTo:{docTypes:['*']},intent:'',prompt:''}); renderPPre(); }
function ppCard(s,i){
  const isSig=(s.output||(s.kind==='classify'?'signal':'rewrite'))==='signal';
  return `<div class="panel">
    <div class="edit" style="align-items:center;gap:10px;flex-wrap:wrap">
      <label style="cursor:pointer" title="enabled"><input type="checkbox" ${s.enabled!==false?'checked':''} onchange="ppSet(${i},'enabled',this.checked)"></label>
      <input value="${esc(s.name||'')}" placeholder="step name" style="width:150px" onchange="ppSet(${i},'name',this.value)">
      <span class="note" title="how the pipeline uses this step's output">output</span>
      <select onchange="ppSet(${i},'output',this.value);renderPPre()"><option value="rewrite" ${!isSig?'selected':''}>Rewrite text</option><option value="signal" ${isSig?'selected':''}>Extract signal</option></select>
      <span class="note">model</span><select onchange="ppSet(${i},'model',this.value)">${roleOpts(s.model||'preprocess')}</select>
      <span class="note">doc types</span><input value="${esc((s.appliesTo&&s.appliesTo.docTypes||['*']).join(', '))}" style="width:130px" title="comma list, or * for all" onchange="ppScope(${i},this.value)">
      <span class="spacer"></span>
      <i class="ti ti-arrow-up" style="cursor:pointer" title="move up" onclick="ppMove(${i},-1)"></i>
      <i class="ti ti-arrow-down" style="cursor:pointer" title="move down" onclick="ppMove(${i},1)"></i>
      <i class="ti ti-trash" style="cursor:pointer" title="delete" onclick="ppDel(${i})"></i>
    </div>
    ${isSig?`<div class="edit" style="margin-top:8px;gap:10px;align-items:center"><span class="note">meta key</span><input value="${esc(s.metaKey||'')}" placeholder="e.g. relevance" style="width:130px" onchange="ppSet(${i},'metaKey',this.value)"><span class="note">labels</span><input value="${esc((s.labels||[]).join(', '))}" placeholder="high, low — leave empty for a free-form value" style="width:300px" onchange="ppLabels(${i},this.value)"></div>`:''}
    <div style="margin-top:10px">
      <div class="note">Intent (plain English) — describe what this step should do, then compile.</div>
      <textarea placeholder="${isSig?'classify how relevant a doc is… (or extract a free-form value)':'keep only material financial info; drop ads/disclaimers…'}" style="width:100%;min-height:50px" onchange="ppSet(${i},'intent',this.value)">${esc(s.intent||'')}</textarea>
      <button class="ghost" onclick="ppCompile(${i})"><i class="ti ti-sparkles"></i> Compile from intent (Sonnet)</button> <span class="note" id="pcn_${i}">${s.compiledBy?'compiled by '+esc(s.compiledBy):''}</span>
    </div>
    <div style="margin-top:10px">
      <div class="note">Prompt — run verbatim by <b>${esc(s.model||'preprocess')}</b> per document</div>
      <textarea style="width:100%;min-height:80px" onchange="ppSet(${i},'prompt',this.value)">${esc(s.prompt||'')}</textarea>
    </div>
    <div class="panel" style="margin-top:10px">
      <div class="note">Test on sample</div>
      <textarea id="pt_${i}" placeholder="paste a sample document…" style="width:100%;min-height:56px"></textarea>
      <div class="edit" style="margin-top:6px;align-items:center;gap:10px"><button class="ghost" onclick="ppTest(${i})"><i class="ti ti-player-play"></i> Test</button><span class="note" id="ptn_${i}"></span></div>
      <pre id="pto_${i}" class="jlog" style="display:none;margin-top:8px;white-space:pre-wrap"></pre>
    </div>
  </div>`;
}
function renderPPre(){
  const pp=KPIPE.preprocessing; const steps=pp.steps||(pp.steps=[]);
  const cards=steps.map((s,i)=>ppCard(s,i)).join('')||'<div class="panel"><span class="muted">No steps yet — add one, or describe an intent and compile it.</span></div>';
  $('#pbody').innerHTML=`
    <div class="panel" style="margin-bottom:14px">
      <label class="row" style="cursor:pointer;align-items:center;gap:8px"><input type="checkbox" ${pp.enabled?'checked':''} onchange="KPIPE.preprocessing.enabled=this.checked"> <span class="k">Pre-processing enabled</span></label>
      <div class="note">When off, documents go straight to cognify with no pre-processing.</div>
    </div>
    ${cards}
    <div class="panel"><button class="ghost" onclick="ppAdd()"><i class="ti ti-plus"></i> Add step</button></div>
    <div class="panel">${pSaveBar()}</div>`;
}
async function ppCompile(i){ const s=ppStep(i),n=$('#pcn_'+i); if(!s.intent||!s.intent.trim()){ if(n)n.textContent='write an intent first'; return; } if(n)n.textContent='compiling… (Sonnet)';
  try{ const r=await (await apiFetch(`/api/knowledge/${state.alias}/pipeline/compile-prompt`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({intent:s.intent,output:s.output||'rewrite',labels:s.labels||[]})})).json();
    if(r.ok&&r.prompt){ s.prompt=r.prompt; s.compiledBy=r.compiledBy||'reasoner'; renderPPre(); } else if(n) n.textContent='✗ '+(r.detail||'failed'); }
  catch(e){ if(n)n.textContent='✗ '+e.message; } }
async function ppTest(i){ const s=ppStep(i),txt=$('#pt_'+i)?.value||'',n=$('#ptn_'+i),out=$('#pto_'+i); if(!txt.trim()){ if(n)n.textContent='paste a sample first'; return; } if(n)n.textContent='running…';
  try{ const r=await (await apiFetch(`/api/knowledge/${state.alias}/pipeline/test-step`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step:s,text:txt})})).json();
    if(!r.ok){ if(n)n.textContent='✗ '+(r.detail||'failed'); return; }
    const hasMeta=r.meta&&Object.keys(r.meta).length;
    if(n)n.textContent = r.error?('error: '+r.error):(r.dropped?'→ DROP (gated out)':('✓ '+(hasMeta?('signal '+JSON.stringify(r.meta)):'rewritten')));
    if(out){ out.style.display='block'; out.textContent = r.dropped?'(document would be dropped)':(hasMeta?JSON.stringify(r.meta,null,2):(r.output||'(no output)')); } }
  catch(e){ if(n)n.textContent='✗ '+e.message; } }

/* cognify-strategy segment */
function cogR(i){ return KPIPE.cognify.routing.rules[i]; }
function cogCond(i,k,v,isList){ const r=cogR(i); const c=r.if||(r.if={}); if(isList){ const a=csv(v); if(a.length)c[k]=a; else delete c[k]; } else { if(v&&v.trim())c[k]=v.trim(); else delete c[k]; } }
function cogModel(i,v){ cogR(i).model=v; }
function cogDel(i){ KPIPE.cognify.routing.rules.splice(i,1); renderPCog(); }
function cogAdd(){ KPIPE.cognify.routing.rules.push({if:{},model:'extractor-pro'}); renderPCog(); }
function cogRule(r,i){
  const c=r.if||(r.if={}); const mOpts=roleOpts(r.model);
  return `<div class="panel"><div class="edit" style="flex-wrap:wrap;gap:10px;align-items:center">
    <span class="note">if docType</span><input value="${esc((c.docType||[]).join(', '))}" placeholder="concall, brokerage" style="width:150px" onchange="cogCond(${i},'docType',this.value,true)">
    <span class="note">pattern</span><input value="${esc(c.pattern||'')}" placeholder="earnings|merger" style="width:150px" onchange="cogCond(${i},'pattern',this.value,false)">
    <span class="note">tag</span><input value="${esc((c.tag||[]).join(', '))}" placeholder="high-value" style="width:110px" onchange="cogCond(${i},'tag',this.value,true)">
    <span class="note">relevance</span><input value="${esc((c.relevance||[]).join(', '))}" placeholder="high" style="width:90px" onchange="cogCond(${i},'relevance',this.value,true)">
    <span class="spacer"></span><span class="note">→ model</span><select onchange="cogModel(${i},this.value)">${mOpts}</select>
    <i class="ti ti-trash" style="cursor:pointer" title="delete" onclick="cogDel(${i})"></i>
  </div></div>`;
}
function renderPCog(){
  const c=KPIPE.cognify; if(!c.routing)c.routing={enabled:false,rules:[]}; const rules=c.routing.rules||(c.routing.rules=[]);
  const dOpts=roleOpts(c.defaultModel);
  const ruleCards=rules.map((r,i)=>cogRule(r,i)).join('')||'<div class="panel"><span class="muted">No rules — every doc uses the default model.</span></div>';
  $('#pbody').innerHTML=`
    <div class="panel">
      <div class="edit" style="align-items:center;gap:10px"><span class="k">Default model</span><select onchange="KPIPE.cognify.defaultModel=this.value">${dOpts}</select></div>
      <div class="note" style="margin-top:6px">Used when no rule matches (bulk). Keep this cheap (Flash); escalate via rules.</div>
    </div>
    <div class="panel">
      <label class="row" style="cursor:pointer;align-items:center;gap:8px"><input type="checkbox" ${c.routing.enabled?'checked':''} onchange="KPIPE.cognify.routing.enabled=this.checked"> <span class="k">Relevance routing enabled</span></label>
      <div class="note">First matching rule wins; conditions within a rule are AND-ed. A manual model pick on the Add-data form overrides routing.</div>
    </div>
    ${ruleCards}
    <div class="panel"><button class="ghost" onclick="cogAdd()"><i class="ti ti-plus"></i> Add rule</button></div>
    <div class="panel">${pSaveBar()}</div>`;
}
async function pSave(){ const n=$('#pnote'); if(n)n.textContent='saving…';
  try{ await apiFetch(`/api/knowledge/${state.alias}/pipeline`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({preprocessing:KPIPE.preprocessing,cognify:KPIPE.cognify})}); KPIPE_ALIAS=null; await loadSchema(state.alias,true); if(n)n.textContent='✓ saved — applies on next ingest'; }
  catch(e){ if(n)n.textContent='✗ '+e.message; } }

/* --- models: per-project role -> OpenRouter model map --- */
const FIXED_ROLES=['preprocess','extractor','extractor-pro','reasoner'];
function ensureKmodels(){ const a=state.alias, sc=KSCHEMA[a]||{}; if(KMODELS_ALIAS!==a||!KMODELS){ const r=(sc.models&&sc.models.roles)||DEFAULT_ROLES; KMODELS=JSON.parse(JSON.stringify(r)); KMODELS_ALIAS=a; } }
function kmSet(role,v){ KMODELS[role]=v; }
function kmDel(role){ delete KMODELS[role]; renderKModels(); }
function kmAdd(){ const i=$('#kmrole'),v=(i.value||'').trim(); if(!v)return; if(!KMODELS[v])KMODELS[v]=''; i.value=''; renderKModels(); }
function renderKModels(){
  ensureKmodels();
  const rows=Object.keys(KMODELS).map(role=>`<div class="edit" style="align-items:center;gap:10px;margin-bottom:8px">
    <span class="k" style="width:130px">${esc(role)}</span>
    <input value="${esc(KMODELS[role]||'')}" placeholder="vendor/model (OpenRouter id)" style="flex:1;min-width:240px" onchange="kmSet('${esc(role)}',this.value)">
    ${FIXED_ROLES.includes(role)?'':`<i class="ti ti-trash" style="cursor:pointer" title="remove role" onclick="kmDel('${esc(role)}')"></i>`}
  </div>`).join('');
  $('#kbody').innerHTML=`
    <div class="panel" style="margin-bottom:14px">
      <h3><i class="ti ti-cpu"></i> Models for ${esc(curProj().label)}</h3>
      <div class="note" style="margin-bottom:12px">Map each pipeline <b>role</b> to a real <b>OpenRouter model</b> (vendor/model). Saved per project (local, not committed) and applied to the gateway immediately. Roles are stable handles your Pipeline references — change the target here without touching the pipeline.</div>
      ${rows}
      <div class="edit" style="margin-top:10px;align-items:center;gap:8px"><input id="kmrole" placeholder="+ role name" style="width:150px"><button class="ghost" onclick="kmAdd()">Add role</button></div>
    </div>
    <div class="panel">
      <div class="note" style="margin-bottom:10px"><b>preprocess</b> runs clean/filter/signal steps · <b>extractor</b> bulk cognify · <b>extractor-pro</b> high-value cognify · <b>reasoner</b> compiles step prompts. Embeddings are global and not set here.</div>
      <div style="display:flex;gap:10px;align-items:center"><button onclick="kmSave()"><i class="ti ti-device-floppy"></i> Save models</button><span class="note" id="kmnote"></span></div>
    </div>`;
}
async function kmSave(){ const n=$('#kmnote'); if(n)n.textContent='saving + syncing gateway…';
  const roles={}; Object.keys(KMODELS).forEach(r=>{ const v=(KMODELS[r]||'').trim(); if(v)roles[r]=v; });
  try{ const res=await (await apiFetch(`/api/knowledge/${state.alias}/models`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roles})})).json();
    if(res.ok){ KMODELS_ALIAS=null; await loadSchema(state.alias,true); const sy=res.sync||{}; if(n)n.textContent='✓ saved'+(sy.ok===false?(' (sync warning: '+esc(sy.error||'')+')'):' — gateway synced'); }
    else if(n)n.textContent='✗ '+(res.detail||'failed'); }
  catch(e){ if(n)n.textContent='✗ '+e.message; } }

/* ---------- boot + poll ---------- */
async function refreshOverview(){
  try{
    const d=await (await apiFetch("/api/overview")).json();
    state.overview=d;
    if(!state.alias && d.projects.length) state.alias=d.projects[0].alias;
    renderSidebar(); renderTopbar(); renderTabs();
    const ae=document.activeElement;
    const typing = ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA");
    if(state.tab==="overview" && !typing) $("#content").innerHTML=`<div class="scroll">${viewOverview()}</div>`;
  }catch(e){}
}
// Keep multiple clients (Mac + iPhone) in sync: when the app regains focus, re-pull the
// active view so changes made elsewhere (approve a signal, run a task, edit a budget) show up.
// Chat is skipped so a live agent stream is never interrupted; overview is covered by its
// own 15s poll inside refreshOverview().
function syncNow(){
  if(document.visibilityState!=='visible') return;
  refreshOverview();
  if(state.tab!=='chat' && state.tab!=='overview') renderContent();
}
document.addEventListener('visibilitychange', syncNow);
setInterval(syncNow, 60000);

// PWA: register the service worker (enables Add to Home Screen + offline shell).
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }

async function boot(){
  await refreshOverview();
  renderContent();
  setInterval(refreshOverview, 15000);
}
boot();
</script>
</body>
</html>
