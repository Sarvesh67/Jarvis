# LiteLLM proxy — the Jarvis LLM gateway + budget control plane.
# One OpenAI-compatible endpoint (:4000) routing to OpenRouter (cloud) + local Ollama.
# Hermes and Cognee point their "brain" here, never at OpenRouter directly.
# Models are also editable from the /ui dashboard (STORE_MODEL_IN_DB=True).

model_list:
  # NOTE: these pipeline roles (extractor / extractor-pro / preprocess) are the **baseline**
  # models — Cognee's default (jarvis_cognee.set_llm_model) + the smoke test use `extractor`.
  # For dashboard-driven ingest, each project remaps these roles to a real OpenRouter model on
  # the Models tab; those are served by per-project deduped `or--<slug>` DB-pool models created
  # at runtime (cognee/sync_models.py + dashboard/app.py:_sync_models_sync), so they override
  # these for routed ingest without a restart. Keep these as the fallback / non-dashboard path.

  # --- bulk cognify extraction (structured output) ---
  # DeepSeek V4 Flash: cheaper than gpt-4o-mini and a 1M ctx window. Cognify uses
  # instructor tool_call mode, so this model MUST support tool calling — verified by
  # the one-doc cognify gate in setup. If Flash ever fails structured output, fall back
  # to `openrouter/openai/gpt-4o-mini` here (tool-calling is rock-solid there).
  - model_name: extractor
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        usage:
          include: true

  # --- high-value cognify extraction (dense/high-signal docs) ---
  # DeepSeek V4 Pro: native tool calling confirmed. Routed to by the cognify strategy
  # (relevance rules) or picked manually for high-value documents.
  - model_name: extractor-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        usage:
          include: true

  # --- pre-processing (clean / filter / annotate before cognify) ---
  # DeepSeek V4 Flash again, but prose-in/prose-out (no tools needed), so tool-calling
  # support is irrelevant here. Cheap per-doc; the relevance gate drops junk before cognify.
  - model_name: preprocess
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        usage:
          include: true

  # --- frontier reasoning (alpha synthesis / hard multi-hop / prompt compilation) ---
  - model_name: reasoner
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      # Gateway-side Anthropic prompt caching: clients reach us as a generic
      # OpenAI endpoint and never send cache_control, so LiteLLM injects a
      # breakpoint on the system message. In Anthropic's cache order
      # (tools → system → messages) that caches the whole static prefix
      # (tool schemas + system prompt) — re-read at ~10% on repeat calls
      # within the TTL. Cuts cost on every multi-step agent turn.
      cache_control_injection_points:
        - location: message
          role: system
      # OpenRouter only APPLIES + REPORTS the Anthropic cache discount when the
      # request asks for usage accounting. Clients (Hermes/Cognee) don't send
      # this, so default it here — without it LiteLLM bills the full prompt rate
      # and the per-project budget is over-counted even though caching occurred.
      extra_body:
        usage:
          include: true

  # --- cheap chat / triage ---
  - model_name: fast
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4.5
      api_key: os.environ/OPENROUTER_API_KEY
      cache_control_injection_points:
        - location: message
          role: system
      extra_body:
        usage:
          include: true

  # --- local, free: embeddings (Cognee) ---
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true          # tolerate provider-specific param mismatches
  num_retries: 2
  request_timeout: 600
