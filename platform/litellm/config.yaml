# LiteLLM proxy — the Jarvis LLM gateway + budget control plane.
# One OpenAI-compatible endpoint (:4000) routing to OpenRouter (cloud) + local Ollama.
# Hermes and Cognee point their "brain" here, never at OpenRouter directly.
# Models are also editable from the /ui dashboard (STORE_MODEL_IN_DB=True).

model_list:
  # --- cheap cloud extraction (Cognee cognify / bulk structured output) ---
  - model_name: extractor
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY

  # --- frontier reasoning (alpha synthesis / hard multi-hop) ---
  - model_name: reasoner
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      # Gateway-side Anthropic prompt caching: clients reach us as a generic
      # OpenAI endpoint and never send cache_control, so LiteLLM injects a
      # breakpoint on the system message. In Anthropic's cache order
      # (tools → system → messages) that caches the whole static prefix
      # (tool schemas + system prompt) — re-read at ~10% on repeat calls
      # within the TTL. Cuts cost on every multi-step agent turn.
      cache_control_injection_points:
        - location: message
          role: system
      # OpenRouter only APPLIES + REPORTS the Anthropic cache discount when the
      # request asks for usage accounting. Clients (Hermes/Cognee) don't send
      # this, so default it here — without it LiteLLM bills the full prompt rate
      # and the per-project budget is over-counted even though caching occurred.
      extra_body:
        usage:
          include: true

  # --- cheap chat / triage ---
  - model_name: fast
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4.5
      api_key: os.environ/OPENROUTER_API_KEY
      cache_control_injection_points:
        - location: message
          role: system
      extra_body:
        usage:
          include: true

  # --- local, free: domain bulk model (override target to cut cloud spend) ---
  - model_name: local-finance
    litellm_params:
      model: ollama/llama-open-finance
      api_base: http://host.docker.internal:11434

  # --- local, free: embeddings (Cognee) ---
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true          # tolerate provider-specific param mismatches
  num_retries: 2
  request_timeout: 600
